apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jinguzhou.fullname" . }}-config
data:
  jinguzhou.yaml: |
    gateway:
      host: {{ .Values.gateway.host | quote }}
      port: {{ .Values.gateway.port }}
    policy:
      files:
        - "/app/rules/baseline.yaml"
        - "/app/rules/prompt_injection.yaml"
        - "/app/rules/privacy.yaml"
        - "/app/rules/tool_use.yaml"
    provider:
      type: "openai-compatible"
      base_url: {{ .Values.provider.baseUrl | quote }}
      api_key_env: "OPENAI_API_KEY"
      timeout_seconds: 60
      headers: {}
    audit:
      enabled: true
      backend: {{ .Values.audit.backend | quote }}
      path: {{ .Values.audit.path | quote }}
      postgres_dsn_env: "JINGUZHOU_POSTGRES_DSN"
      redact: true
    approvals:
      enabled: true
      secret_env: "JINGUZHOU_APPROVAL_SECRET"
      ttl_seconds: 900
    security:
      admin_api_key_env: "JINGUZHOU_ADMIN_API_KEY"
    tool_adapters: []
