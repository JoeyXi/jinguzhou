image:
  repository: jinguzhou
  tag: "0.3.0-beta"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8787

gateway:
  host: "0.0.0.0"
  port: 8787

provider:
  baseUrl: "https://api.openai.com"
  apiKeySecretName: ""
  apiKeySecretKey: "OPENAI_API_KEY"

approvals:
  secretName: ""
  secretKey: "JINGUZHOU_APPROVAL_SECRET"

security:
  adminApiKeySecretName: ""
  adminApiKeySecretKey: "JINGUZHOU_ADMIN_API_KEY"

audit:
  backend: "jsonl"
  path: "/data/audit.jsonl"
  postgresDsnSecretName: ""
  postgresDsnSecretKey: "JINGUZHOU_POSTGRES_DSN"

resources: {}
