services:
  gateway:
    build:
      context: .
    image: jinguzhou:0.3.0-beta
    ports:
      - "8787:8787"
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      JINGUZHOU_APPROVAL_SECRET: "${JINGUZHOU_APPROVAL_SECRET:-change_me}"
    command:
      - jinguzhou
      - gateway
      - --config
      - jinguzhou.yaml
      - --host
      - 0.0.0.0
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 6
