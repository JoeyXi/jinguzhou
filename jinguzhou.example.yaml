gateway:
  host: "127.0.0.1"
  port: 8787

policy:
  files:
    - "rules/baseline.yaml"
    - "rules/prompt_injection.yaml"
    - "rules/privacy.yaml"

provider:
  type: "openai-compatible"
  base_url: "https://api.openai.com"
  api_key_env: "OPENAI_API_KEY"
  timeout_seconds: 60
  headers: {}

audit:
  enabled: true
  backend: "jsonl"
  path: ".jinguzhou/audit.jsonl"
  redact: true
  postgres_dsn_env: "JINGUZHOU_POSTGRES_DSN"
  postgres_table: "jinguzhou_audit_events"

approvals:
  enabled: true
  secret_env: "JINGUZHOU_APPROVAL_SECRET"
  ttl_seconds: 900

security:
  admin_api_key_env: "JINGUZHOU_ADMIN_API_KEY"

tool_adapters:
  - name: "custom-http-tool"
    protocols: ["openai", "langchain"]
    tool_name_patterns: ["custom.fetch", "partner.http.*"]
    canonical_tool_name: "network.request"
    priority: 200
    extraction:
      url_fields: ["dest", "target_url"]
