version: 1
name: privacy
description: Protect secrets and personal data in output.
rules:
  - id: output.secret_leak.redact
    stage: output
    category: privacy
    severity: high
    action: redact
    reason: Output appears to contain secret material or credential-like data.
    match:
      regex:
        - "sk-[A-Za-z0-9]{16,}"
        - "AKIA[0-9A-Z]{16}"

